name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart format --set-exit-if-changed lib bin test

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart test

  generated-app-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart test test/integration/generated_app_smoke_test.dart

  generated-app-native-gate:
    runs-on: macos-15
    needs: generated-app-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Generate native gate app
        run: >
          dart run bin/agentic_base.dart create native_gate_app
          --no-interactive
          --output-dir "$RUNNER_TEMP"
          --platforms android,ios,macos
          --ci-provider gitlab
      - name: Run native validation
        working-directory: ${{ runner.temp }}/native_gate_app
        run: |
          chmod +x tools/*.sh
          ./tools/ci-check.sh
