name: CI
on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      generated_app: ${{ steps.diff.outputs.generated_app }}
      slow_canary: ${{ steps.diff.outputs.slow_canary }}
      native_smoke: ${{ steps.diff.outputs.native_smoke }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: diff
        shell: bash
        run: |
          set -euo pipefail

          forced=false
          protected_push=false
          ref_name="${GITHUB_REF#refs/heads/}"
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" || "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            forced=true
          fi
          if [[ "$GITHUB_EVENT_NAME" == "push" && ( "$ref_name" == "main" || "$ref_name" == release/* || "$ref_name" == hotfix/* ) ]]; then
            protected_push=true
          fi

          changed_file_list="$RUNNER_TEMP/changed-files.txt"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
          fi

          git diff --name-only "$base_sha" "$GITHUB_SHA" > "$changed_file_list" || true
          echo "Changed files:"
          if [[ -s "$changed_file_list" ]]; then
            cat "$changed_file_list"
          else
            echo "(none detected; treating heavy lanes as required)"
            forced=true
          fi

          generated_app=false
          slow_canary=false
          native_smoke=false

          if [[ "$forced" == "true" || "$protected_push" == "true" ]]; then
            generated_app=true
            slow_canary=true
            native_smoke=true
          else
            while IFS= read -r file; do
              case "$file" in
                .github/workflows/ci.yml|bin/**|bricks/**|lib/agentic_base.dart|lib/src/cli/**|lib/src/config/**|lib/src/generators/**|lib/src/modules/**|lib/src/tui/**|test/integration/**|test/src/cli/**|test/src/config/**|test/src/generators/**|test/src/modules/**|test/src/tui/**)
                  generated_app=true
                  ;;
              esac
              case "$file" in
                .github/workflows/ci.yml|bin/**|bricks/**|lib/agentic_base.dart|lib/src/cli/**|lib/src/config/**|lib/src/generators/**|lib/src/modules/**|lib/src/observability/**|lib/src/tui/**|docs/08-*|docs/09-*|docs/10-*|docs/11-*|docs/12-*|docs/13-*|docs/14-*|docs/15-*|docs/16-*|docs/17-*|docs/18-*|docs/19-*|test/integration/**|test/src/cli/**|test/src/config/**|test/src/generators/**|test/src/modules/**|test/src/tui/**)
                  slow_canary=true
                  ;;
              esac
              case "$file" in
                .github/workflows/ci.yml|bin/**|bricks/agentic_app/**|lib/agentic_base.dart|lib/src/cli/**|lib/src/config/**|lib/src/generators/**|lib/src/modules/**|lib/src/tui/**|test/integration/**|test/src/cli/**|test/src/config/**|test/src/generators/**|test/src/modules/**|test/src/tui/**)
                  native_smoke=true
                  ;;
              esac
            done < "$changed_file_list"
          fi

          {
            echo "generated_app=$generated_app"
            echo "slow_canary=$slow_canary"
            echo "native_smoke=$native_smoke"
          } | tee -a "$GITHUB_OUTPUT"

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart format --set-exit-if-changed lib bin test

  test:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable
      - run: dart pub get
      - run: dart test test/src --exclude-tags generated-app --reporter github

  generated-app-smoke:
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
    if: ${{ needs.changes.outputs.generated_app == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart test test/integration/generated_app_smoke_test.dart --exclude-tags slow-canary --reporter github

  slow-canary:
    runs-on: ubuntu-latest
    needs:
      - changes
      - test
    if: ${{ needs.changes.outputs.slow_canary == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart test test/integration/generated_app_smoke_test.dart --tags slow-canary --reporter github

  pub-publish-dry-run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable
      - run: dart pub get
      - name: Validate pub.dev package archive
        shell: bash
        run: |
          set -o pipefail
          dart pub publish --dry-run 2>&1 | tee "$RUNNER_TEMP/pub-publish-dry-run.log"
          grep -q "Package has 0 warnings" "$RUNNER_TEMP/pub-publish-dry-run.log"

  generated-app-native-gate:
    runs-on: macos-15
    needs:
      - changes
      - test
    if: ${{ needs.changes.outputs.native_smoke == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: dart pub get
      - name: Generate native gate app
        run: >
          dart run bin/agentic_base.dart create native_gate_app
          --no-interactive
          --output-dir "$RUNNER_TEMP"
          --platforms android,ios,macos
          --ci-provider gitlab
          --verify-mode none
      - name: Run native validation
        working-directory: ${{ runner.temp }}/native_gate_app
        run: |
          chmod +x tools/*.sh
          ./tools/ci-check.sh

  ci-required:
    runs-on: ubuntu-latest
    needs:
      - changes
      - analyze
      - test
      - generated-app-smoke
      - slow-canary
      - pub-publish-dry-run
      - generated-app-native-gate
    if: always()
    steps:
      - name: Check aggregate CI result
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TEST_RESULT: ${{ needs.test.result }}
          GENERATED_APP_SMOKE_RESULT: ${{ needs['generated-app-smoke'].result }}
          SLOW_CANARY_RESULT: ${{ needs['slow-canary'].result }}
          PUB_PUBLISH_DRY_RUN_RESULT: ${{ needs['pub-publish-dry-run'].result }}
          GENERATED_APP_NATIVE_GATE_RESULT: ${{ needs['generated-app-native-gate'].result }}
        run: |
          set -euo pipefail
          failed=0
          for job in \
            CHANGES_RESULT \
            ANALYZE_RESULT \
            TEST_RESULT \
            GENERATED_APP_SMOKE_RESULT \
            SLOW_CANARY_RESULT \
            PUB_PUBLISH_DRY_RUN_RESULT \
            GENERATED_APP_NATIVE_GATE_RESULT; do
            result="${!job}"
            echo "$job=$result"
            case "$result" in
              success|skipped)
                ;;
              *)
                failed=1
                ;;
            esac
          done
          exit "$failed"
