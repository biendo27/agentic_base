details:
  ownership:
    title: "One Flutter app shell"
    body: "The starter keeps bootstrap, routing, and shared diagnostics inside lib/app so features can stay focused."
    highlights:
      - "MaterialApp.router is mounted once and fed by the generated app router."
      - "Flavor state stays visible in the starter flow instead of being hidden in setup code."
      - "Generator-owned surfaces remain obvious to both humans and agents."
  localization:
    title: "Typed localization"
    body: "The starter proves Slang-generated localization on day 0 and keeps locale changes visible through the settings route."
    highlights:
      - "Source translations stay in assets/i18n and generate typed accessors."
      - "Locale switches do not require feature-specific wiring."
      - "Unsupported locales still fall back through the app locale contract."
  flavors:
    title: "Env-driven flavors"
    body: "Diagnostics show which flavor entrypoint and env contract are currently active, so runtime drift is easy to spot."
    highlights:
      - "Each flavor entrypoint remains explicit in lib/main_*.dart."
      - "Compile-time env files stay visible in the starter diagnostics."
      - "The same dart-define contract is shared by local scripts, CI, and IDE launch configs."
