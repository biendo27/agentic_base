# Production should be mapped to a protected GitLab environment in project settings.
.deploy_template:
  stage: deploy
  tags: [macos]
  needs: [native_validate]
  when: manual
  before_script:
    - chmod +x tools/*.sh
  artifacts:
    when: always
    paths:
      - {{evidence_dir}}

deploy_dev:
  extends: .deploy_template
  environment:
    name: development
  script:
    - ./tools/release.sh dev firebase

deploy_staging_android_internal:
  extends: .deploy_template
  environment:
    name: staging
  script:
    - ./tools/release.sh staging play-internal

deploy_staging_testflight:
  extends: .deploy_template
  environment:
    name: staging
  script:
    - ./tools/release.sh staging testflight

deploy_prod_play:
  extends: .deploy_template
  environment:
    name: production
  script:
    - ./tools/release.sh prod play-production

deploy_prod_app_store:
  extends: .deploy_template
  environment:
    name: production
  script:
    - ./tools/release.sh prod app-store
