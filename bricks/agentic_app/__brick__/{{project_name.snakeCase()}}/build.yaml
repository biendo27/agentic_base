targets:
  $default:
    builders:
      slang_build_runner:
        enabled: false
        options:
          base_locale: en
          fallback_strategy: base_locale
          input_directory: assets/i18n
          input_file_pattern: .i18n.yaml
          output_directory: lib/app/i18n
          output_file_name: translations.g.dart
          namespaces: true
          flutter_integration: true
          flat_map: false
          format:
            enabled: true
      json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake
