{{=<% %>=}}
name: Deploy Staging
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_internal:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: <%flutter_sdk_channel%>
          flutter-version: <%flutter_sdk_version%>
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: chmod +x tools/*.sh
      - run: bundle install
        working-directory: android/fastlane
      - run: ./tools/release.sh staging play-internal
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-android-evidence
          path: <%{evidence_dir}%>

  ios_testflight:
    runs-on: macos-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: <%flutter_sdk_channel%>
          flutter-version: <%flutter_sdk_version%>
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: chmod +x tools/*.sh
      - run: bundle install
        working-directory: ios/fastlane
      - run: ./tools/release.sh staging testflight
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-ios-evidence
          path: <%{evidence_dir}%>
