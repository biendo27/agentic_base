name: Deploy Production
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --flavor prod -t lib/main_prod.dart
      - run: flutter build appbundle --flavor prod -t lib/main_prod.dart
      - name: Deploy to App Store / Play Store
        run: echo "TODO - Configure App Store and Play Store Production deployment"
