{{=<% %>=}}
name: Deploy Dev
on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firebase_distribution:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: chmod +x tools/*.sh
      - run: ./tools/release-preflight.sh dev firebase
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_DEV }}
          FIREBASE_GROUPS: ${{ vars.FIREBASE_GROUPS_DEV }}
          FIREBASE_TESTERS: ${{ vars.FIREBASE_TESTERS_DEV }}
      - run: ./tools/release.sh dev firebase
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_DEV }}
          FIREBASE_GROUPS: ${{ vars.FIREBASE_GROUPS_DEV }}
          FIREBASE_TESTERS: ${{ vars.FIREBASE_TESTERS_DEV }}
