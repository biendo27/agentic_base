name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build Release APK
        run: flutter build apk --flavor prod -t lib/main_prod.dart --obfuscate --split-debug-info=build/debug-info
      - name: Build Release AAB
        run: flutter build appbundle --flavor prod -t lib/main_prod.dart --obfuscate --split-debug-info=build/debug-info
