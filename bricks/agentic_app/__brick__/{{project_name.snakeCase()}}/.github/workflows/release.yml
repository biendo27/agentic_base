{{=<% %>=}}
name: Release
on:
  push:
    tags: ['v*']

jobs:
  build_android_release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: {{flutter_sdk_channel}}
          flutter-version: {{flutter_sdk_version}}
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: chmod +x tools/*.sh
      - run: ./tools/release-preflight.sh prod play-production
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
      - run: ./tools/build.sh prod appbundle
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-android-evidence
          path: {{evidence_dir}}

  build_ios_release:
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: {{flutter_sdk_channel}}
          flutter-version: {{flutter_sdk_version}}
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - run: chmod +x tools/*.sh
      - run: ./tools/release-preflight.sh prod app-store
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      - run: ./tools/build.sh prod ipa
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-ios-evidence
          path: {{evidence_dir}}
