{{=<% %>=}}
name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: <%flutter_sdk_channel%>
          flutter-version: <%flutter_sdk_version%>
          cache: true
      - run: chmod +x tools/*.sh
      - run: ./tools/verify.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-evidence
          path: <%{evidence_dir}%>

  build:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        flavor: [dev, staging]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: <%flutter_sdk_channel%>
          flutter-version: <%flutter_sdk_version%>
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: chmod +x tools/*.sh
      - run: ./tools/build.sh ${{ matrix.flavor }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.flavor }}-evidence
          path: <%{evidence_dir}%>
