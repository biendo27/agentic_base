name: agentic_app
description: A production-ready Flutter app template optimized for AI-agent development.
version: 0.1.0

environment:
  mason: ">=0.1.0-dev.74 <0.2.0"

vars:
  project_name:
    type: string
    description: The project name (snake_case)
    prompt: "Project name:"
  org:
    type: string
    description: Organization reverse domain
    default: com.example
    prompt: "Organization:"
  platforms:
    type: list
    description: Target platforms
    prompt: "Platforms:"
  state_management:
    type: string
    description: State management choice
    default: cubit
    prompt: "State management:"
  state_display_name:
    type: string
    description: Human-readable state management label
    default: Flutter Bloc / Cubit
    prompt: "State management label:"
  is_cubit:
    type: boolean
    description: Whether the scaffold should generate Cubit runtime seams
    default: true
    prompt: "Generate Cubit seams?"
  is_riverpod:
    type: boolean
    description: Whether the scaffold should generate Riverpod runtime seams
    default: false
    prompt: "Generate Riverpod seams?"
  is_mobx:
    type: boolean
    description: Whether the scaffold should generate MobX runtime seams
    default: false
    prompt: "Generate MobX seams?"
  uses_get_it:
    type: boolean
    description: Whether the scaffold uses GetIt-based DI
    default: true
    prompt: "Use GetIt?"
  uses_injectable:
    type: boolean
    description: Whether the scaffold uses injectable code generation
    default: true
    prompt: "Use injectable?"
  uses_riverpod:
    type: boolean
    description: Whether the scaffold uses Riverpod providers
    default: false
    prompt: "Use Riverpod providers?"
  uses_mobx:
    type: boolean
    description: Whether the scaffold uses MobX
    default: false
    prompt: "Use MobX?"
  presentation_runtime:
    type: string
    description: State runtime keyword used by starter features
    default: cubit
    prompt: "Presentation runtime:"
  flavors:
    type: list
    description: Build flavors
    prompt: "Flavors:"
  ci_provider:
    type: string
    description: CI provider choice
    default: github
    prompt: "CI provider:"
  app_profile:
    type: string
    description: Harness app profile
    default: subscription-commerce-app
    prompt: "Harness app profile:"
  app_profile_label:
    type: string
    description: Human-readable harness app profile
    default: Consumer App
    prompt: "Harness app profile label:"
  app_profile_summary:
    type: string
    description: Harness profile summary
    default: User-facing app shell with first-class app-shell and navigation confidence.
    prompt: "Harness app profile summary:"
  support_tier_label:
    type: string
    description: Support tier label
    default: Tier 1
    prompt: "Support tier label:"
  support_tier_summary:
    type: string
    description: Support tier summary
    default: Core gates plus profile-specific required checks.
    prompt: "Support tier summary:"
  required_gate_pack:
    type: string
    description: Required gate pack description
    default: core + subscription commerce pack
    prompt: "Required gate pack:"
  starter_analytics_enabled:
    type: boolean
    description: Whether starter analytics seams are enabled
    default: false
    prompt: "Enable starter analytics seams?"
  starter_crashlytics_enabled:
    type: boolean
    description: Whether starter crash reporting seams are enabled
    default: false
    prompt: "Enable starter crash reporting seams?"
  starter_remote_config_enabled:
    type: boolean
    description: Whether starter remote config seams are enabled
    default: false
    prompt: "Enable starter remote config seams?"
  starter_feature_flags_enabled:
    type: boolean
    description: Whether starter feature flag seams are enabled
    default: false
    prompt: "Enable starter feature flag seams?"
  starter_payments_enabled:
    type: boolean
    description: Whether starter payment seams are enabled
    default: false
    prompt: "Enable starter payment seams?"
  starter_entitlement_enabled:
    type: boolean
    description: Whether starter entitlement seams are enabled
    default: false
    prompt: "Enable starter entitlement seams?"
  starter_consent_enabled:
    type: boolean
    description: Whether starter consent seams are enabled
    default: false
    prompt: "Enable starter consent seams?"
  starter_ads_enabled:
    type: boolean
    description: Whether starter ads seams are enabled
    default: false
    prompt: "Enable starter ads seams?"
  starter_notifications_enabled:
    type: boolean
    description: Whether starter notifications seams are enabled
    default: false
    prompt: "Enable starter notifications seams?"
  starter_deep_links_enabled:
    type: boolean
    description: Whether starter deep link seams are enabled
    default: false
    prompt: "Enable starter deep link seams?"
  starter_in_app_review_enabled:
    type: boolean
    description: Whether starter in-app review seams are enabled
    default: false
    prompt: "Enable starter in-app review seams?"
  starter_app_update_enabled:
    type: boolean
    description: Whether starter app update seams are enabled
    default: false
    prompt: "Enable starter app update seams?"
  starter_commerce_enabled:
    type: boolean
    description: Whether the starter should surface the commerce lane
    default: false
    prompt: "Enable starter commerce lane?"
  starter_config_enabled:
    type: boolean
    description: Whether the starter should surface config controls
    default: false
    prompt: "Enable starter config lane?"
  starter_lifecycle_enabled:
    type: boolean
    description: Whether the starter should surface lifecycle signals
    default: false
    prompt: "Enable starter lifecycle lane?"
  has_required_profile_verify_gate:
    type: boolean
    description: Whether the profile adds a required verify gate
    default: false
    prompt: "Has required profile verify gate?"
  required_profile_verify_gate_id:
    type: string
    description: Profile-specific required verify gate id
    default: ""
    prompt: "Required profile verify gate id:"
  required_profile_verify_gate_label:
    type: string
    description: Profile-specific required verify gate label
    default: ""
    prompt: "Required profile verify gate label:"
  required_profile_verify_gate_dimension:
    type: string
    description: Quality dimension updated by the required profile verify gate
    default: ux_confidence
    prompt: "Required profile verify gate dimension:"
  required_profile_verify_gate_test_path:
    type: string
    description: Test target for the required profile verify gate
    default: ""
    prompt: "Required profile verify gate test path:"
  has_advisory_profile_verify_gate:
    type: boolean
    description: Whether the profile declares advisory-only starter checks
    default: false
    prompt: "Has advisory profile verify gate?"
  advisory_profile_verify_gate_label:
    type: string
    description: Advisory-only starter gate summary
    default: ""
    prompt: "Advisory profile verify gate label:"
  secondary_traits_csv:
    type: string
    description: Secondary harness traits rendered as text
    default: none
    prompt: "Secondary traits:"
  evidence_dir:
    type: string
    description: Evidence output directory
    default: artifacts/evidence
    prompt: "Evidence directory:"
  flutter_sdk_manager:
    type: string
    description: Declared Flutter SDK manager
    default: system
    prompt: "Flutter SDK manager:"
  flutter_sdk_channel:
    type: string
    description: Declared Flutter SDK channel
    default: stable
    prompt: "Flutter SDK channel:"
  flutter_sdk_version:
    type: string
    description: Declared Flutter SDK version
    default: 3.41.6
    prompt: "Flutter SDK version:"
  flutter_sdk_policy:
    type: string
    description: Declared Flutter SDK policy
    default: newest_tested
    prompt: "Flutter SDK policy:"
