name: {{project_name.snakeCase()}}
description: A Flutter application generated by agentic_base.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1

  # Routing
  auto_route: ^11.1.0

  # DI
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Network
  dio: ^5.9.2

  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # UI
  flutter_screenutil: ^5.9.3

  # Utils
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  build_runner: ^2.13.1
  auto_route_generator: ^10.5.0
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  injectable_generator: ^2.12.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
